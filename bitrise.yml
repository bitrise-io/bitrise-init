format_version: "7"
default_step_lib_source: https://github.com/bitrise-io/bitrise-steplib.git

workflows:
  ci:
    steps:
    - script:
        title: Set up Go
        inputs:
        - content: asdf install
    - bundle::run_linters: { }
    - bundle::run_unit_tests: { }
    - bundle::run_integration_tests: { }

step_bundles:
  run_integration_tests:
    steps:
    - script:
        title: Run integration tests
        inputs:
        - content: go test -v ./_tests/integration/...

  run_unit_tests:
    steps:
    - go-list: { }
    - go-test: { }

  run_linters:
    steps:
    - script:
        title: YAML lint
        inputs:
        - content: |-
            #!/bin/env bash
            set -ex

            if [[ "$OSTYPE" == "linux-gnu"* ]]; then
              # pipx is only available in OS repos from Ubuntu 23+, so we need to install via pip for now
              ubuntu_version=$(lsb_release -rs)
              if [[ $ubuntu_version == "20.04" ]]; then
                apt-get remove -y yamllint
                # Default Python version is the system-wide and it doesn't have venv (which is needed for pipx)
                apt-get update
                yes | apt-get install python3.8-venv
                # Ubuntu 20 ships with an old pip that doesn't recognize the --break-system-packages flag
                pip install pipx
              else
                pip install --user --break-system-packages pipx
              fi
              export PATH="$PATH:/root/.local/bin"
              pipx ensurepath
              source ~/.bashrc # reload $PATH changes
            else
              if brew list pipx &>/dev/null ; then
                echo "pipx already installed"
              else
                echo "Installing pipx"
                HOMEBREW_NO_INSTALLED_DEPENDENTS_CHECK=1 brew install pipx
                export PATH="$PATH:$HOME/.local/bin"
                pipx ensurepath
                source ~/.bashrc # reload $PATH changes
              fi
            fi

            pipx install yamllint
            yamllint -c yamllint.yml --format colored .
    - script:
        title: golangci-lint
        inputs:
        - content: |-
            #!/usr/bin/env bash
            set -ex
            curl -sSfL https://raw.githubusercontent.com/golangci/golangci-lint/HEAD/install.sh | sh -s v2.6.0
            ./bin/golangci-lint run --max-same-issues 0
