format_version: "7"
default_step_lib_source: https://github.com/bitrise-io/bitrise-steplib.git

tools:
  go: 1.25.7

workflows:
  ci:
    steps:
    - bundle::run_lint_and_unit_tests: { }
    - bundle::run_integration_tests: { }

step_bundles:
  run_integration_tests:
    steps:
    - script:
        title: Run integration tests
        inputs:
        - content: go test -v ./_tests/integration/...

  run_lint_and_unit_tests:
    steps:
    - git::https://github.com/bitrise-steplib/steps-check.git@golangci-lint-version:
        inputs:
        - golangci_lint_version: v2.6.0
        - skip_step_yml_validation: "yes"
